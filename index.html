<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rend - A ChatGPT Conversation Renderer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <form id="import-form" class="application-chrome">
        <label for="share-url">ChatGPT Share URL</label>
        <div class="controls">
          <input id="share-url" name="url" type="url" required placeholder="https://chatgpt.com/share/...">
          <button type="submit">Import</button>
          <button id="open-project" type="button">Open Project...</button>
        </div>
      </form>
      <p id="status" class="application-chrome transient-status" role="status" hidden></p>
      <dialog id="workspace-switch-dialog" class="workspace-switch-dialog">
        <form method="dialog">
          <h2>Save changes?</h2>
          <p>The current project has unsaved changes.</p>
          <div class="workspace-switch-actions">
            <button type="submit" value="save">Save</button>
            <button type="submit" value="discard">Don't Save</button>
            <button type="submit" value="cancel">Cancel</button>
          </div>
        </form>
      </dialog>

      <section id="summary-panel" class="summary-panel application-chrome" hidden>
        <section id="import-summary" class="summary">
          <h2>Imported conversation</h2>
          <dl></dl>
        </section>
        <section id="validation" class="summary">
          <h2>Validation</h2>
          <dl></dl>
        </section>
      </section>

      <section id="document-actions" class="document-actions sticky-review application-chrome" hidden>
        <div class="review-controls">
          <label class="include-all-control">
            <input id="include-all" type="checkbox" disabled>
            Include All Messages
          </label>
          <div class="action-buttons">
            <span id="project-state" class="project-state" aria-live="polite"></span>
            <button id="save-project" type="button" disabled>Save Project</button>
            <button id="save-project-as" type="button" disabled>Save Project As...</button>
            <button id="save-markdown" type="button">Save Markdown As...</button>
            <button id="print-selected" type="button">Print Selected</button>
          </div>
        </div>
        <aside id="safety-recommendation" class="safety-recommendation" role="note" hidden>
          <span>Safety reminder: if this transcript no longer needs to remain public, revoke its ChatGPT Share link.</span>
          <button id="dismiss-safety-recommendation" class="dismiss-notice" type="button"
                  aria-label="Dismiss Share-link safety reminder" title="Dismiss">✕</button>
        </aside>
      </section>
      <section id="conversation" aria-live="polite"></section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
